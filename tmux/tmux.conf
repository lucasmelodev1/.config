# ---- Prefix ----
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ---- General quality of life ----
set -g mouse on                    # mouse support: click to select pane, drag to resize, scroll to scroll
set -g base-index 1                # windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on         # renumber windows when one is closed
set -g escape-time 0               # no delay for escape key (important for Neovim!)
set -g history-limit 10000
set -s focus-events on             # lets Neovim detect focus changes (autoread etc.)

# ---- True color support (needed for Neovim themes) ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ---- Splits that make sense ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"   # new windows open in same dir

# ---- Vim-style pane navigation (Prefix + h/j/k/l) ----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Seamless navigation between tmux panes and Neovim splits ----
# Requires the vim-tmux-navigator plugin on the Neovim side (see below)
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l"

# ---- Resize panes with Prefix + HJKL (capital) ----
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ---- Seamless navigation between tmux panes and Neovim splits (arrow keys) ----
bind -n C-Left  if-shell "$is_vim" "send-keys C-Left"  "if-shell '[ #{pane_at_left} -eq 1 ]' 'previous-window' 'select-pane -L'"
bind -n C-Right if-shell "$is_vim" "send-keys C-Right" "if-shell '[ #{pane_at_right} -eq 1 ]' 'next-window' 'select-pane -R'"
bind -n C-Up    if-shell "$is_vim" "send-keys C-Up"    "select-pane -U"
bind -n C-Down  if-shell "$is_vim" "send-keys C-Down"  "select-pane -D"

# ---- Resize panes with Prefix + Shift+Arrow ----
bind -r S-Left  resize-pane -L 5
bind -r S-Down  resize-pane -D 5
bind -r S-Up    resize-pane -U 5
bind -r S-Right resize-pane -R 5

# ---- Reload config ----
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ---- Status bar (minimal, useful info) ----
set -g status-position bottom
set -g status-style bg=black,fg=white
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=cyan]%H:%M #[fg=yellow]%d-%b"
setw -g window-status-current-style bg=blue,fg=black,bold

# ---- Copy mode using vi keys ----
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---- Alt+1 through Alt+5 to jump directly to window 1-5 ----
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
